version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: turnos-db
    environment:
      POSTGRES_USER: ${DB_USER:-turnos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-turnos_password}
      POSTGRES_DB: ${DB_NAME:-turnos_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-turnos_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: turnos-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: turnos-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-turnos_user}:${DB_PASSWORD:-turnos_password}@postgres:5432/${DB_NAME:-turnos_dev}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      API_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/backend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
